# Inquira Configuration
# =====================
# User-editable settings for Python environment and proxy configuration.
# This file is read by the Tauri launcher on startup.

[python]
# Python version to install via UV (only used on first launch)
version = "3.12"

# Set this if you're behind a corporate proxy or using JFrog/Nexus/Artifactory
# index-url = "https://your-company.jfrog.io/artifactory/api/pypi/pypi-remote/simple"
# Environment override (higher priority than this file): INQUIRA_UV_INDEX_URL

# Set this to use a pre-installed Python instead of UV-managed one
# python-path = "/usr/local/bin/python3.12"

[proxy]
# Uncomment and set these if you're behind a corporate proxy
# http-proxy = "http://proxy.company.com:8080"
# https-proxy = "http://proxy.company.com:8080"
# no-proxy = "localhost,127.0.0.1"

[backend]
# Port for the FastAPI backend server
port = 8000
# Host to bind the backend server to
host = "localhost"

[execution]
# Switch execution backend without code changes.
# Supported values: "local_jupyter"
provider = "local_jupyter"

[execution.runner]
# Legacy runner venv name (workspace runtime now uses <workspace>/.venv).
venv-name = ".runner-venv"
# Optional package list installed into the runner venv alongside ipykernel and defaults.
packages = [
  "narwhals",
  "duckdb",
  "pandas",
  "polars",
  "pyarrow",
  "plotly",
  "nbformat>=5.10.4",
  "statsmodels",
  "scikit-learn",
]
# Idle kernel eviction threshold in minutes.
kernel-idle-minutes = 30
# Scratchpad artifact retention in hours.
scratchpad-ttl-hours = 48
# Per-workspace scratchpad max size in GB.
scratchpad-max-size-gb = 10
# Runtime timeout guardrails.
timeout-seconds = 60
memory-limit-mb = 512
max-output-kb = 512

[terminal]
# Terminal access is opt-in for technical users.
enable = true

[backend.phoenix]
# Enable Phoenix tracing for LangGraph/LangChain (used by backend startup)
enabled = false
# Phoenix project name shown in UI
project = "inquira-dev"
# Local Phoenix collector endpoint (OTLP HTTP)
endpoint = "http://127.0.0.1:6006/v1/traces"

[llm]
# Supported providers: "openrouter", "openai", "ollama", "anthropic"
# - openrouter: uses OpenRouter API (default, requires OPENROUTER_API_KEY)
# - openai: uses OpenAI API directly (requires OPENAI_API_KEY, base-url = "https://api.openai.com/v1")
# - ollama: uses local Ollama instance (no API key needed, base-url = "http://localhost:11434/v1")
# - anthropic: uses Anthropic API directly (requires ANTHROPIC_API_KEY, base-url is ignored)
provider = "openrouter"
base-url = "https://openrouter.ai/api/v1"
default-model = "google/gemini-2.5-flash"
lite-model = "google/gemini-2.5-flash-lite"
# Deprecated in favor of the [llm.providers.*] sections below, but preserved for backwards compatibility
models = [
  "google/gemini-3-flash-preview",
  "google/gemini-2.5-flash",
  "google/gemini-2.5-flash-lite",
  "openrouter/free",
]

[llm.providers.openrouter]
main-models = [
    "google/gemini-3-flash-preview",
    "google/gemini-2.5-flash",
    "openrouter/free",
]
lite-models = [
    "google/gemma-3-27b-it",
    "google/gemma-2-9b-it",
    "google/gemma-3-27b-it:free"
]

[llm.providers.openai]
main-models = [
    "gpt-4.1",
    "gpt-4o",
    "gpt-4o-mini",
]
lite-models = [
    "gpt-4.1-mini",
    "gpt-4.1-nano",
]

[llm.providers.anthropic]
main-models = [
    "claude-3-5-sonnet-latest",
    "claude-3-7-sonnet-latest",
]
lite-models = [
    "claude-3-5-haiku-latest",
]

[llm.providers.ollama]
main-models = [
    "gemma3:1b"
]
lite-models = [
    "gemma3:1b"
]

[llm.limits]
# Default output cap when no endpoint-specific override is used.
default = 4096
# Schema generation/regeneration cap.
schema = 2048
# Code-generation/chat execution cap.
code_generation = 4096

[agent]
version = "agent_v2"
max-tool-calls = 5
max-code-executions = 3
turn-timeout = 120

[agent.bash]
allowed-commands = ["rg", "grep", "wc", "head", "tail", "ls", "cat", "find"]
sandbox = "."
max-output-chars = 2000

[agent.memory]
max-recent-messages = 10
max-summary-tokens = 500

[agent.intervention]
timeout-seconds = 60

[ui]
# Global Plotly chart styling behavior in the UI.
# Supported values:
# - "soft": apply UI-coherent colors only (recommended default)
# - "hard": apply broader chart styling defaults (colors + typography/margins/legend behavior)
plotly-theme-mode = "hard"
