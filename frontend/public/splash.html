<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inquira</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f6f8;
        --surface: #ffffff;
        --text: #101828;
        --muted: #667085;
        --border: #e4e7ec;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        background: radial-gradient(160% 140% at 80% 20%, #eef1f5 0%, var(--bg) 60%);
        color: var(--text);
      }

      .shell {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        padding: 28px;
      }

      .panel {
        width: 100%;
        max-width: 420px;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--surface);
        box-shadow: 0 18px 40px rgba(16, 24, 40, 0.08);
        padding: 28px 28px 24px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: linear-gradient(135deg, #101828, #344054);
        display: grid;
        place-items: center;
        color: #fff;
        font-weight: 600;
        letter-spacing: 0.04em;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      p {
        margin: 10px 0 0;
        font-size: 13px;
        line-height: 1.45;
        color: var(--muted);
      }

      .bar {
        margin-top: 20px;
        height: 6px;
        border-radius: 999px;
        overflow: hidden;
        background: #eef2f6;
      }

      .bar > span {
        display: block;
        height: 100%;
        width: 28%;
        border-radius: inherit;
        background: linear-gradient(90deg, #101828 0%, #475467 100%);
        animation: slide 1.15s ease-in-out infinite;
      }

      @keyframes slide {
        0% {
          transform: translateX(-80%);
        }
        100% {
          transform: translateX(380%);
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="brand">
          <div class="logo">IQ</div>
          <h1>Starting Inquira</h1>
        </div>
        <p>
          Desktop services are booting first so the primary app shell opens only
          after backend APIs are healthy.
        </p>
        <div class="bar" aria-hidden="true"><span></span></div>
      </section>
    </main>
  </body>
</html>
