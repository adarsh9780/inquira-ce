name: Security Review

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Audit backend dependencies
        run: uv run --project backend --with pip-audit pip-audit
      - name: Audit agent dependencies
        run: uv run --project agents --with pip-audit pip-audit
      - name: Audit frontend dependencies
        run: npm --prefix frontend audit --audit-level=critical
      - name: Generate frontend SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm --output-file frontend-sbom.json frontend
      - uses: actions/upload-artifact@v6
        with:
          name: frontend-sbom
          path: frontend-sbom.json
