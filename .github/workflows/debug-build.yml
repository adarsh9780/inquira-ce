name: Debug Build (Windows)

on:
  push:
    branches:
      - "**"  # Trigger on all branches
  workflow_dispatch:  # Manual trigger from Actions tab

concurrency:
  group: debug-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup UV
        uses: astral-sh/setup-uv@v4
        with:
          uv-version: "0.6.3"

      - name: Stage bundled uv
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path src-tauri/bundled-tools -Force | Out-Null
          Copy-Item (Get-Command uv).Source src-tauri/bundled-tools/uv.exe -Force

      - name: Build Tauri app (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: debug-build-${{ github.sha }}
          releaseName: Debug Build ${{ github.ref_name }} (${{ github.sha }})
          releaseBody: |
            Debug build from branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Trigger: ${{ github.event_name }}
          releaseDraft: false
          prerelease: true
          args: --bundles nsis

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: inquira-windows-exe-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.msi
          retention-days: 5

      - name: Upload installer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: src-tauri/target/release/bundle/nsis/*.log
          retention-days: 5
