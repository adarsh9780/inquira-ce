name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      INQUIRA_DB_URL: sqlite+aiosqlite:///./ci_v1.db
      INQUIRA_ALLOW_SCHEMA_BOOTSTRAP: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - name: Install backend dependencies
        run: uv sync --group dev
      - name: Lint (v1 scope)
        run: uv run --group dev ruff check app/v1 tests
      - name: Type check (v1 scope)
        run: uv run --group dev mypy --config-file mypy.ini app/v1
      - name: Migration check
        run: uv run alembic upgrade head
      - name: Backend tests
        run: uv run pytest tests -q

  agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Run agent runtime tests
        run: uv run --with pytest --with pytest-asyncio pytest tests -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Frontend tests
        run: npm test
      - name: Frontend build
        run: npm run build

  tauri:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Run Rust tests
        run: cargo test

  e2e:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend dependencies
        run: uv sync --project backend --group dev
      - name: Install frontend dependencies
        run: npm --prefix frontend ci
      - name: Install Playwright browsers
        run: npx --prefix frontend playwright install chromium webkit
      - name: Run Playwright E2E suite
        run: npm --prefix frontend run e2e
