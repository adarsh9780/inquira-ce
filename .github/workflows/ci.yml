name: CI

on:
  push:
    branches: ["master"]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      INQUIRA_DB_URL: sqlite+aiosqlite:///./ci_v1.db
      INQUIRA_ALLOW_SCHEMA_BOOTSTRAP: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - name: Install backend dependencies
        run: uv sync --group dev
      - name: Lint (v1 scope)
        run: uv run --group dev ruff check app/v1 tests
      - name: Type check (v1 scope)
        run: uv run --group dev mypy --config-file mypy.ini app/v1
      - name: Migration check
        run: uv run alembic upgrade head
      - name: Backend tests
        run: uv run pytest tests -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Frontend tests
        run: npm test
      - name: Frontend build
        run: npm run build

  e2e:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend dependencies
        run: uv sync --project backend --group dev
      - name: Install frontend dependencies
        run: npm --prefix frontend ci
      - name: Install Playwright browsers
        run: npx --prefix frontend playwright install chromium webkit
      - name: Run Playwright E2E suite
        run: npm --prefix frontend run e2e
