name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  guard_release_prereqs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure tag commit is reachable from master
        run: |
          git fetch origin master --depth=1
          if ! git branch -r --contains "$GITHUB_SHA" | grep -q "origin/master"; then
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit on master."
            exit 1
          fi

      - name: Ensure CI workflow succeeded for this tag commit (wait for completion)
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const maxAttempts = 60; // 20 minutes max wait at 20s polling.
            const pollIntervalMs = 20000;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                owner,
                repo,
                workflow_id: "ci.yml",
                head_sha: sha,
                event: "push",
                per_page: 100,
              });

              const run = runs
                .filter((r) => r.head_sha === sha)
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

              if (!run) {
                core.info(`Attempt ${attempt}/${maxAttempts}: no CI run found yet for commit ${sha}.`);
                await sleep(pollIntervalMs);
                continue;
              }

              if (run.status !== "completed") {
                core.info(
                  `Attempt ${attempt}/${maxAttempts}: CI run ${run.id} is ${run.status}. Waiting...`
                );
                await sleep(pollIntervalMs);
                continue;
              }

              if (run.conclusion !== "success") {
                core.setFailed(
                  `CI run ${run.id} for commit ${sha} completed with conclusion '${run.conclusion}'.`
                );
                return;
              }

              core.info(`Found successful CI run ${run.id} for commit ${sha}.`);
              return;
            }

            core.setFailed(
              `Timed out waiting for successful CI (ci.yml) run for commit ${sha} after ${maxAttempts} attempts.`
            );

  build_tauri:
    needs: [guard_release_prereqs]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            optional: false
          - os: windows-latest
            optional: true
    continue-on-error: ${{ matrix.optional }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup UV
        uses: astral-sh/setup-uv@v4
        with:
          uv-version: "0.6.3"

      - name: Stage bundled uv (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p src-tauri/bundled-tools
          cp "$(command -v uv)" src-tauri/bundled-tools/uv
          chmod +x src-tauri/bundled-tools/uv

      - name: Stage bundled uv (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path src-tauri/bundled-tools -Force | Out-Null
          Copy-Item (Get-Command uv).Source src-tauri/bundled-tools/uv.exe -Force

      - name: Load release metadata
        id: release_meta
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          meta_path = Path(".github/release/metadata.json")
          data = json.loads(meta_path.read_text(encoding="utf-8"))
          ref_name = os.environ.get("GITHUB_REF_NAME", "").strip()
          default_name = f"Inquira {ref_name}" if ref_name else "Inquira Release"
          name = str(data.get("release_name", "")).strip() or default_name
          body = str(data.get("release_body", "")).strip()
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as out:
              out.write(f"release_name={name}\n")
              out.write("release_body<<EOF\n")
              out.write(body + "\n")
              out.write("EOF\n")
          PY

      - name: Detect release channel
        id: release_channel
        shell: bash
        run: |
          ref_name="${GITHUB_REF_NAME}"
          if [[ "$ref_name" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect macOS signing configuration
        if: matrix.os == 'macos-latest'
        id: mac_signing
        shell: bash
        run: |
          if [[ -n "${{ secrets.APPLE_CERTIFICATE }}" && -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" && -n "${{ secrets.APPLE_SIGNING_IDENTITY }}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and publish desktop artifacts (macOS signed)
        if: matrix.os == 'macos-latest' && steps.mac_signing.outputs.enabled == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ steps.release_meta.outputs.release_name }}
          releaseBody: ${{ steps.release_meta.outputs.release_body }}
          releaseDraft: false
          prerelease: ${{ steps.release_channel.outputs.prerelease }}

      - name: Build and publish desktop artifacts (macOS unsigned)
        if: matrix.os == 'macos-latest' && steps.mac_signing.outputs.enabled == 'false'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ steps.release_meta.outputs.release_name }}
          releaseBody: ${{ steps.release_meta.outputs.release_body }}
          releaseDraft: false
          prerelease: ${{ steps.release_channel.outputs.prerelease }}

      - name: Build and publish desktop artifacts (Windows NSIS)
        if: matrix.os == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ steps.release_meta.outputs.release_name }}
          releaseBody: ${{ steps.release_meta.outputs.release_body }}
          releaseDraft: false
          prerelease: ${{ steps.release_channel.outputs.prerelease }}
          args: --bundles nsis
      - name: Upload desktop bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-bundle-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
